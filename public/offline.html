<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#22223b" />
    <title>Tarot Trainer Offline</title>
    <style>
      :root {
        color: #1f2421;
        background: #f5f0e6;
        font-family: Inter, Pretendard, system-ui, sans-serif;
      }

      body {
        min-width: 320px;
        min-height: 100vh;
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: max(1.25rem, env(safe-area-inset-top)) max(1.25rem, env(safe-area-inset-right)) max(1.25rem, env(safe-area-inset-bottom)) max(1.25rem, env(safe-area-inset-left));
        box-sizing: border-box;
      }

      main {
        width: min(100%, 28rem);
        border: 1px solid rgba(34, 34, 59, 0.16);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.56);
        padding: 1.25rem;
        box-shadow: 0 20px 48px rgba(34, 34, 59, 0.12);
      }

      img {
        width: 4rem;
        height: 4rem;
        border-radius: 18px;
      }

      h1 {
        margin: 1rem 0 0;
        font-size: 1.35rem;
        line-height: 1.25;
      }

      p {
        margin: 0.75rem 0 0;
        line-height: 1.65;
        color: #57534e;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/pwa-192x192.png" alt="" />
      <h1>Tarot Trainer</h1>
      <p>오프라인 상태입니다. 연결이 돌아오면 홈 화면 아이콘으로 다시 열거나 새로고침해 주세요.</p>
    </main>
  </body>
</html>
